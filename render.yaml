services:
  - type: web
    name: real-estate-analyzer-backend
    env: python
    rootDir: Backend
    buildCommand: "pip install -r render_requirements.txt"
    startCommand: "uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: GEMINI_API_KEY
        sync: false
    autoDeploy: true
